services:
  # Backend API service
  - type: web
    name: medigenius-api
    runtime: docker
    dockerContext: ./backend
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.siliconflow.cn/v1
      - key: LLM_MODEL
        value: Pro/deepseek-ai/DeepSeek-V3.2
      - key: LIGHT_LLM_MODEL
        value: Pro/deepseek-ai/DeepSeek-V3.2
      - key: TAVILY_API_KEY
        sync: false
      - key: PDF_PATH
        value: data/medical_book.pdf
      - key: PYTHONPATH
        value: /app

  # Frontend static service
  - type: static
    name: medigenius-web
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    publishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: medigenius-api
          type: web
          property: host
